# Shared proxy headers — include this in every proxy location
# Place this file at /etc/nginx/conf.d/proxy_params or inline as below.
# (If your nginx has /etc/nginx/proxy_params already, use that instead.)

# ==============================================================================
# DEFAULT: Block direct IP / unknown-host access
# ==============================================================================
server {
    listen 80  default_server;
    listen 443 ssl default_server;
    server_name _;
    ssl_certificate        /etc/letsencrypt/live/judoclubrho.it/fullchain.pem;
    ssl_certificate_key    /etc/letsencrypt/live/judoclubrho.it/privkey.pem;
    return 404;
}

# ==============================================================================
# metricamusic.it
# ==============================================================================
server {
    listen 80;
    server_name metricamusic.it www.metricamusic.it;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name metricamusic.it www.metricamusic.it;
    ssl_certificate        /etc/letsencrypt/live/metricamusic.it/fullchain.pem;
    ssl_certificate_key    /etc/letsencrypt/live/metricamusic.it/privkey.pem;
    location / {
        proxy_pass http://localhost:99;
        include /etc/nginx/proxy_params;
    }
}

